info:
  app:
    name: Workflow System
    version: 1.0.0
    description: Enterprise Workflow Management System

server:
    port: 8080
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/workflow_db
    username: your_postgres_db_name
    password: your_postgres_db_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

    database-platform: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: mylogestsecretkeyforenterpriseworkflowmanagement222242
  expiration: 900000

refresh-token:
  expiration: 604800000 

management:
  endpoints:
    web: 
      exposure: 
        include: health,info,metrics,loggers
  endpoint:
    health: 
      show-details: always 

logging: 
  level: 
    root: INFO
    com.workflowsystem.demo: DEBUG
  pattern: 
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/workflow.log
    