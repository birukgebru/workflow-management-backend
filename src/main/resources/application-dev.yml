server:
    port: 8080
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/workflow_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

    database-platform: org.hibernate.dialect.PostgreSQLDialect

  servlet: 
    multipart: 
      max-file-size: 10485760
      max-request-size: 10485760

jwt:
  secret: mylogestsecretkeyforenterpriseworkflowmanagement222242
  expiration: 86400000

refresh-token:
  expiration: 604800000

file:
  upload-dir: uploads
